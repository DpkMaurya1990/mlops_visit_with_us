name: MLOps Pipeline - Visit With Us

on:
  push:
    branches: [ main ] # This line ensures the workflow runs only on pushes to the main branch

jobs:                   
  mlops-workflow:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v3

    - name: 2. Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 3. Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Data Preparation 
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python prepare_data.py

    - name: 5. Model Training & Logging 
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python train_model.py

    - name: 6. Deploy to Hugging Face Spaces 
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: python deploy.py
